services:
  postgres:
    image: postgres:16.4-alpine
    container_name: financial_hub_postgres
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./hub/src/lib/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres
        -c max_connections=${POSTGRES_MAX_CONNECTIONS}
        -c shared_buffers=128MB
        -c effective_cache_size=256MB
        -c work_mem=4MB

  pgweb:
    image: sosedoff/pgweb:0.15.0
    container_name: financial_hub_pgweb
    restart: unless-stopped
    ports:
      - "${PGWEB_PORT}:8081/tcp"
    environment:
      PGWEB_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
